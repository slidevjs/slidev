catalogMode: prefer
ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  # Shiki v4.2.0 cohort and `@shikijs/magic-move` (rename of `shiki-magic-move`)
  # all ship together from antfu's monorepo; pnpm v11's 24h `minimumReleaseAge`
  # default would otherwise block this install until the cohort matures.
  - '@iconify/json@2.2.482'
  - '@shikijs/core@4.2.0'
  - '@shikijs/engine-javascript@4.2.0'
  - '@shikijs/engine-oniguruma@4.2.0'
  - '@shikijs/langs@4.2.0'
  - '@shikijs/magic-move'
  - '@shikijs/markdown-it@4.2.0'
  - '@shikijs/monaco@4.2.0'
  - '@shikijs/primitive@4.2.0'
  - '@shikijs/themes@4.2.0'
  - '@shikijs/twoslash@4.2.0'
  - '@shikijs/types@4.2.0'
  - '@shikijs/vitepress-twoslash@4.2.0'
  - shiki@4.2.0

shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - langium
# pnpm v11 evaluates `trustPolicy: no-downgrade` against the *originally-declared*
# transitive version (before `resolutions`/`overrides` are applied), so long-lived
# transitives that were once published with provenance flag false positives. Ignore
# trust downgrades for packages published more than 30 days ago.
trustPolicyIgnoreAfter: 43200
packages:
  - packages/*
  - demo/*
  - cypress/fixtures/*
  - docs

strictPeerDependencies: false
linkWorkspacePackages: true

patchedDependencies:
  '@hedgedoc/markdown-it-plugins@2.1.4': patches/@hedgedoc__markdown-it-plugins@2.1.4.patch
